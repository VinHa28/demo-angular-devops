name: CI/CD Pipeline - Angular to AWS EC2

# 1. Thời điểm kích hoạt Workflow
on:
  push:
    branches: [ "main" ] # Kích hoạt mỗi khi push code lên nhánh main (nếu nhánh bạn là 'master' thì sửa thành 'master')

jobs:
  # =========================================================
  # JOB 1: BUILD ANGULAR & PUSH DOCKER IMAGE LÊN DOCKER HUB
  # =========================================================
  build-and-push-docker:
    name: Build Angular & Push Docker Image
    runs-on: ubuntu-latest # Chạy trên máy ảo Ubuntu miễn phí của GitHub

    steps:
      # Bước 1.1: Lấy mã nguồn (code) từ GitHub Repo về máy ảo
      - name: Checkout Code
        uses: actions/checkout@v4

      # Bước 1.2: Đăng nhập vào Docker Hub bằng Secrets đã cài ở Giai đoạn 3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Bước 1.3: Build Docker Image dựa trên Dockerfile và Push lên Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/angular-demo:latest

  # =========================================================
  # JOB 2: TRIỂN KHẠI (DEPLOY) LÊN AWS EC2 QUA SSH
  # =========================================================
  deploy-to-ec2:
    name: Deploy to AWS EC2 via SSH
    needs: build-and-push-docker # Bắt buộc Job 1 phải thành công mới chạy Job 2
    runs-on: ubuntu-latest

    steps:
      # Bước 2.1: SSH vào EC2 và thực thi các lệnh Bash Script
      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Đăng nhập / Tải Docker Image mới nhất từ Docker Hub về EC2
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/angular-demo:latest

            # 2. Ép dừng và xóa ngay container cũ (nếu có) để giải phóng tên và cổng
            sudo docker rm -f angular-app || true

            # 3. Chạy container mới từ Image vừa pull về trên cổng NỘI BỘ 8080 (dành cho Nginx Proxy Manager)
            sudo docker run -d --name angular-app -p 8080:80 ${{ secrets.DOCKERHUB_USERNAME }}/angular-demo:latest

            # 4. Dọn dẹp các Docker image cũ không còn dùng để giải phóng dung lượng đĩa EC2
            sudo docker image prune -f || true